active-placeholder: "&fThanks %player% &ffor activating %booster%&f!"
console-displayname: "&cConsole"

queue-format:
    - "&a&lQueued Boosters for category %category%&r &8» &r"
    - ""
    - "&b%number%&8) &f%booster% &8» &fActivated by %activator%&f, duration: &b%time%"
    - ""
    - "&e&oUse &b/boosters queue %category% &eto see the this page!"

empty-queue-format:
    - "&a&lQueued Boosters for category %category%&r &8» &r"
    - ""
    - "&cThere isn't any booster in the queue for this category!"
    - ""
    - "&e&oUse &b/boosters queue %category% &eto see the this page!"