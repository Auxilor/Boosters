name: "1.5x Sell Multiplier"
duration: 72000

category: "sell_multiplier" # The category of the booster, used for queueing and preventing boosters of the same category from being active at the same time. Optional.

merge-tag: "1.5x_Sell_Multiplier" # The tag used to identify boosters that can be merged together. Optional.

effects:
