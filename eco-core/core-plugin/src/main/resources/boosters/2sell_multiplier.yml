name: "2x Sell Multiplier"
duration: 72000

category: "sell_multiplier" # The category of the booster, used for queueing and preventing boosters of the same category from being active at the same time. Optional.

merge-tag: "2x_Sell_Multiplier" # The tag used to identify boosters that can be merged together. Optional.

effects:
  - id: sell_multiplier
    args:
      multiplier: 2

activation-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has activated a &a2x Sell Multiplier Booster&f!"
        - " &fThis booster will last %time%, be sure to thank them!"
        - ""

increment-effects:
