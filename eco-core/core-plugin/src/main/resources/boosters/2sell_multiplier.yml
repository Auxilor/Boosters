    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has increased the &a2x Sell Multiplier Booster's duration&f!"
        - " &fThis booster will last %time%, be sure to thank them!"
        - ""

queue-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has queued a &a2x Sell Multiplier Booster&f!"
        - " &fThis booster will last %time%, when its time comes!"
        - ""

queue-increment-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has increased a &a2x Sell Multiplier Booster&f in the queue!"
        - " &fThis booster will now last %time%, when its time comes!"
        - ""

expiry-effects:
