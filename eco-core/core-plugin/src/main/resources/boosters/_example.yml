# The ID of the booster is the name of the .yml file,
# for example skill_xp_multiplier.yml has the ID of skill_xp_multiplier
# You can place boosters anywhere in this folder,
# including in subfolders if you want to organize your booster configs
# _example.yml is not loaded.

name: "1.5x Sell Multiplier" # The name of the booster, shown to players
duration: 72000 # The duration, in ticks

category: "sell_multiplier" # The category of the booster, used for queueing and preventing boosters of the same category from being active at the same time. Optional.

merge-tag: "1.5x_Sell_Multiplier" # The tag used to identify boosters that can be merged together. Optional.

# Optional per-booster bossbar settings.
# The bossbar progress tracks remaining duration and updates if the booster is incremented.
# Valid colors: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
# Valid styles: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
bossbar:
  enabled: true
  name: "&a1.5x Sell Multiplier" # Defaults to booster "name" if omitted
  color: GREEN
  style: SOLID

# The effects of the booster (i.e. the functionality)
# See here: https://plugins.auxilor.io/effects/configuring-an-effect
effects:
  - id: sell_multiplier
    args:
      multiplier: 1.5

# The conditions required for the Booster to be activated (applies to the player activating the booster)
activation-conditions: []

# The conditions required for the effects to activate
conditions: []

# Effects to be run when the Booster is activated (applies to all players)
# %activator% - The player who activated the booster
# %player% - The player receiving the message/effect
# %time% - The time remaining on the booster
activation-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has activated a &a1.5x Sell Multiplier Booster&f!"
        - " &fThis booster will last %time%, be sure to thank them!"
        - ""

# Effects to be run when the Booster is incremented (applies to all players)
# %activator% - The player who queued the booster
# %player% - The player receiving the message/effect
# %time% - The time remaining on the booster
increment-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has increased the &a1.5x Sell Multiplier Booster's duration&f!"
        - " &fThis booster will last %time%, be sure to thank them!"
        - ""

# Effects to be run when the Booster is queued (applies to all players)
# %activator% - The player who queued the booster
# %player% - The player receiving the message/effect
# %time% - The time remaining on the booster
queue-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has queued a &a1.5x Sell Multiplier Booster&f!"
        - " &fThis booster will last %time%, when its time comes!"
        - ""


# Effects to be run when the Booster is incremented in the queue (applies to all players)
# %activator% - The player who queued the booster
# %player% - The player receiving the message/effect
# %time% - The time remaining on the booster
queue-increment-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " %activator%&f has increased a &a1.5x Sell Multiplier Booster&f in the queue!"
        - " &fThis booster will now last %time%, when its time comes!"
        - ""

# Effects to be run when the Booster expires (applies to all players)
expiry-effects:
  - id: send_message
    args:
      action_bar: false
      messages:
        - ""
        - " &fThe &a1.5x Sell Multiplier Booster&f has ended"
        - " &fGet another one here: &ahttps://store.ecomc.net/package/756887"
        - ""

